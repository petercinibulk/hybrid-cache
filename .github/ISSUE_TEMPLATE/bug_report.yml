name: Bug report
description: Report incorrect behavior in async-hybrid-cache.
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Share a minimal example or exact steps to reproduce the behavior.
      placeholder: |
        1. Configure cache with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: async-hybrid-cache version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - In-memory only
        - Redis
        - RabbitMQ
        - Kafka
        - PostgreSQL
        - Multiple providers
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, tracebacks, configuration, or related details.
