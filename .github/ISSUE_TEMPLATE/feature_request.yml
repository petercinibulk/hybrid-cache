name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case would this help with?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API or behavior would you like to see?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core cache behavior
        - Decorators
        - Serialization
        - Redis
        - RabbitMQ
        - Kafka
        - PostgreSQL
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternative design you considered.
