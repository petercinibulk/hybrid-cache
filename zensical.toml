[project]
site_name = "Async Hybrid Cache"
site_description = "End-user documentation for adopting Async Hybrid Cache in async Python applications."
site_author = "Peter Cinibulk"
site_url = "https://petercinibulk.github.io/async-hybrid-cache/"
repo_url = "https://github.com/petercinibulk/async-hybrid-cache"
repo_name = "petercinibulk/async-hybrid-cache"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2026 The authors"

nav = [
  { "Home" = "index.md" },
  { "Tutorials" = [
    { "Overview" = "tutorials/index.md" },
    { "Get started" = "tutorials/get-started.md" },
    { "Use cache scopes" = "tutorials/use-cache-scopes.md" },
    { "Use with FastAPI" = "tutorials/use-with-fastapi.md" },
  ] },
  { "How-to guides" = [
    { "Overview" = "how-to/index.md" },
    { "Install optional providers" = "how-to/install-providers.md" },
    { "Configure cache policy" = "how-to/configure-cache-policy.md" },
    { "Use cached functions" = "how-to/use-cached-functions.md" },
    { "Use with FastAPI" = "how-to/use-with-fastapi.md" },
    { "Invalidate cached data" = "how-to/invalidate-data.md" },
    { "Choose an invalidation bus" = "how-to/choose-invalidation-bus.md" },
  ] },
  { "Reference" = [
    { "Overview" = "reference/index.md" },
    { "Installation extras" = "reference/installation-extras.md" },
    { "Public API" = "reference/public-api.md" },
    { "Cache options" = "reference/cache-options.md" },
    { "Provider capabilities" = "reference/provider-capabilities.md" },
    { "Decorator behavior" = "reference/decorator-behavior.md" },
    { "Serializers" = "reference/serializers.md" },
  ] },
  { "Explanation" = [
    { "Overview" = "explanation/index.md" },
    { "L1 and L2 caching" = "explanation/l1-l2-caching.md" },
    { "Invalidation model" = "explanation/invalidation-model.md" },
    { "Provider failure modes" = "explanation/provider-failure-modes.md" },
    { "Stampede protection" = "explanation/stampede-protection.md" },
    { "Fail-safe stale reads" = "explanation/fail-safe-stale-reads.md" },
    { "Serializer trust" = "explanation/serializer-trust.md" },
  ] },
]

[project.theme]
language = "en"
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/database-zap"
repo = "fontawesome/brands/github"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"


[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
